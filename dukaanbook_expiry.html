<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Expiry Notification System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green-bg: #c8f0d4;
            --green-border: #5cb876;
            --green-icon: #a3ddb4;
            --green-text: #0e3d1e;
            --green-accent: #2e7d45;

            --yellow-bg: #fff0b3;
            --yellow-border: #e6b800;
            --yellow-icon: #ffe566;
            --yellow-text: #4a3500;
            --yellow-accent: #b38600;

            --red-bg: #ffd6d8;
            --red-border: #e05260;
            --red-icon: #ffaab1;
            --red-text: #4a0008;
            --red-accent: #b52030;

            --page-bg: #f4f3ef;
            --card-bg: #ffffff;
            --border: rgba(0, 0, 0, 0.07);
            --text: #1a1a18;
            --muted: #7a7a72;
            --mono: 'DM Mono', monospace;
            --sans: 'Calibri', 'Segoe UI', sans-serif;
            --r-md: 9px;
            --r-lg: 16px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--page-bg);
            font-family: var(--sans);
            color: var(--text);
            min-height: 100vh;
            padding: 2.5rem 1rem 4rem;
            overflow-x: hidden;
        }

        body {
            animation: pageFade 0.5s ease both;
        }

        @keyframes pageFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .wrapper {
            max-width: 820px;
            margin: 0 auto;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2.5rem;
            animation: slideDown 0.5s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topbar-icon {
            width: 46px;
            height: 46px;
            background: var(--text);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .topbar-icon svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar-info {
            flex: 1;
        }

        .topbar-info h1 {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.4px;
        }

        .topbar-info p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── HOME BUTTON ── */
        .home-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            background: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--border);
            border-radius: 99px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .3px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s, border-color .15s, box-shadow .15s, transform .15s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        .home-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: transform .2s cubic-bezier(.22, 1, .36, 1);
        }

        .home-btn:hover {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
            box-shadow: 0 4px 16px rgba(26, 26, 24, .18);
            transform: translateY(-2px);
        }

        .home-btn:hover svg {
            transform: scale(1.15) rotate(-8deg);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        /* ── Stat row ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 1.75rem;
        }

        .stat {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 14px 16px;
            animation: popUp 0.5s cubic-bezier(.22, 1, .36, 1) both;
        }

        .stat:nth-child(1) {
            animation-delay: .08s
        }

        .stat:nth-child(2) {
            animation-delay: .14s
        }

        .stat:nth-child(3) {
            animation-delay: .20s
        }

        .stat:nth-child(4) {
            animation-delay: .26s
        }

        @keyframes popUp {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-val {
            font-family: var(--mono);
            font-size: 30px;
            font-weight: 500;
            transition: transform .2s;
        }

        .stat:hover .stat-val {
            transform: scale(1.05);
        }

        .stat-val.red {
            color: var(--red-accent);
        }

        .stat-val.yellow {
            color: var(--yellow-accent);
        }

        .stat-val.green {
            color: var(--green-accent);
        }

        /* ── Filter chips ── */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            animation: popUp .5s cubic-bezier(.22, 1, .36, 1) .3s both;
        }

        .chip {
            font-family: var(--sans);
            font-size: 13px;
            padding: 7px 16px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s, transform .12s;
        }

        .chip:hover {
            background: #eeeee9;
            color: var(--text);
            transform: translateY(-1px);
        }

        .chip.active {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        /* ── Notification list ── */
        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Notification card ── */
        .card {
            border-radius: var(--r-lg);
            border: 1.5px solid transparent;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            position: relative;
            animation: cardIn .4s cubic-bezier(.22, 1, .36, 1) both;
            transition: transform .18s cubic-bezier(.22, 1, .36, 1), box-shadow .18s;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-3px) scale(1.005);
            box-shadow: 0 8px 28px rgba(0, 0, 0, .08);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateX(-16px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .card.green {
            background: var(--green-bg);
            border-color: var(--green-border);
        }

        .card.yellow {
            background: var(--yellow-bg);
            border-color: var(--yellow-border);
        }

        .card.red {
            background: var(--red-bg);
            border-color: var(--red-border);
        }

        .card::before {
            content: '';
            width: 5px;
            flex-shrink: 0;
            border-radius: 0;
        }

        .card.green::before {
            background: var(--green-border);
        }

        .card.yellow::before {
            background: var(--yellow-border);
        }

        .card.red::before {
            background: var(--red-border);
        }

        .card-inner {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            flex: 1;
            min-width: 0;
        }

        .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 500;
            transition: transform .2s cubic-bezier(.22, 1, .36, 1);
        }

        .card:hover .icon {
            transform: scale(1.15) rotate(-6deg);
        }

        .card.green .icon {
            background: var(--green-icon);
            color: var(--green-text);
        }

        .card.yellow .icon {
            background: var(--yellow-icon);
            color: var(--yellow-text);
        }

        .card.red .icon {
            background: var(--red-icon);
            color: var(--red-text);
        }

        .card.red .icon {
            position: relative;
            box-shadow: 0 0 0 0 rgba(224, 82, 96, .5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(224, 82, 96, .45);
            }

            60% {
                box-shadow: 0 0 0 10px rgba(224, 82, 96, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(224, 82, 96, 0);
            }
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 15px;
            font-weight: 700;
            font-family: var(--sans);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card.green .product-name {
            color: var(--green-text);
        }

        .card.yellow .product-name {
            color: var(--yellow-text);
        }

        .card.red .product-name {
            color: var(--red-text);
        }

        .meta {
            font-size: 12.5px;
            margin-top: 3px;
            font-family: var(--sans);
        }

        .card.green .meta {
            color: #2e6840;
        }

        .card.yellow .meta {
            color: #7a5800;
        }

        .card.red .meta {
            color: #8a1520;
        }

        .progress-wrap {
            margin-top: 8px;
            height: 4px;
            border-radius: 99px;
            overflow: hidden;
        }

        .card.green .progress-wrap {
            background: rgba(94, 184, 118, .25);
        }

        .card.yellow .progress-wrap {
            background: rgba(230, 184, 0, .25);
        }

        .card.red .progress-wrap {
            background: rgba(224, 82, 96, .25);
        }

        .progress-bar {
            height: 100%;
            border-radius: 99px;
            transition: width .8s cubic-bezier(.22, 1, .36, 1);
        }

        .card.green .progress-bar {
            background: var(--green-border);
        }

        .card.yellow .progress-bar {
            background: var(--yellow-border);
        }

        .card.red .progress-bar {
            background: var(--red-border);
        }

        .tag {
            font-size: 11px;
            font-weight: 700;
            font-family: var(--sans);
            padding: 5px 12px;
            border-radius: 99px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: .3px;
            text-transform: uppercase;
            transition: transform .15s;
        }

        .card:hover .tag {
            transform: scale(1.05);
        }

        .card.green .tag {
            background: var(--green-icon);
            color: var(--green-text);
        }

        .card.yellow .tag {
            background: var(--yellow-icon);
            color: var(--yellow-text);
        }

        .card.red .tag {
            background: var(--red-icon);
            color: var(--red-text);
        }

        .empty {
            text-align: center;
            padding: 3.5rem 1rem;
            border: 1.5px dashed var(--border);
            border-radius: var(--r-lg);
            background: var(--card-bg);
            color: var(--muted);
            font-size: 14px;
            animation: popUp .4s ease both;
        }

        .empty-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 12px;
            color: var(--muted);
            border-top: 1px solid var(--border);
            padding-top: 12px;
            line-height: 1.7;
            animation: popUp .5s ease .5s both;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, .15);
            border-radius: 99px;
        }

        /* ── Cursor tooltip ── */
        #cursor-tip {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, calc(-100% - 14px));
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, .18));
        }

        #cursor-tip.visible {
            display: flex;
        }

        .tip-bubble {
            font-family: 'Calibri', 'Segoe UI', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .6px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 10px;
            white-space: nowrap;
            line-height: 1;
            animation: tipPop .18s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes tipPop {
            from {
                opacity: 0;
                transform: scale(.85) translateY(4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .tip-caret {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
        }

        #cursor-tip.tip-red .tip-bubble {
            background: #c0192a;
            color: #fff;
        }

        #cursor-tip.tip-red .tip-caret {
            border-top: 8px solid #c0192a;
        }

        #cursor-tip.tip-yellow .tip-bubble {
            background: #c98a00;
            color: #fff;
        }

        #cursor-tip.tip-yellow .tip-caret {
            border-top: 8px solid #c98a00;
        }

        #cursor-tip.tip-green .tip-bubble {
            background: #1e7a3a;
            color: #fff;
        }

        #cursor-tip.tip-green .tip-caret {
            border-top: 8px solid #1e7a3a;
        }

        @media (max-width:520px) {
            .tag {
                display: none;
            }

            .card-inner {
                gap: 12px;
                padding: 12px 14px;
            }

            .home-btn span {
                display: none;
            }

            /* icon-only on tiny screens */
            .home-btn {
                padding: 9px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">

        <div class="topbar">
            <div class="topbar-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
            </div>
            <div class="topbar-info">
                <h1>Expiry Notifications</h1>
                <p id="date-display">Loading…</p>
            </div>

            <a href="DukaanBook_profile.html" target="_parent" class="home-btn" style="text-decoration: none;" title="Back to Home">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
                    <polyline points="9 21 9 12 15 12 15 21" />
                </svg>
                <span>Home</span>
            </a>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Total alerts</div>
                <div class="stat-val" id="s-total">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Urgent &lt;5 days</div>
                <div class="stat-val red" id="s-urgent">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Warning 5–7 days</div>
                <div class="stat-val yellow" id="s-warning">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Reminder 7–10 days</div>
                <div class="stat-val green" id="s-reminder">0</div>
            </div>
        </div>

        <div class="filters">
            <button class="chip active" onclick="setFilter('all',this)">All</button>
            <button class="chip" onclick="setFilter('urgent',this)">Urgent (&lt;5 days)</button>
            <button class="chip" onclick="setFilter('warning',this)">Warning (5–7 days)</button>
            <button class="chip" onclick="setFilter('reminder',this)">Reminder (7–10 days)</button>
        </div>

        <div class="notif-list" id="notif-list"></div>

        <p class="footer" id="footer"></p>
    </div>

    <div id="cursor-tip">
        <div class="tip-bubble" id="tip-text"></div>
        <div class="tip-caret"></div>
    </div>

    <script>
        // Apply Theme
        const savedTheme = localStorage.getItem('db_theme_intensity');
        if (savedTheme !== null) {
            const val = parseInt(savedTheme);
            const maxL = 90;
            const minL = 30;
            const lightness = minL + ((maxL - minL) * (val / 100));
            document.documentElement.style.setProperty('--primary', `hsl(211, 56%, ${lightness}%)`);
        }

        /* ── Utilities ── */
        const TODAY = new Date();
        TODAY.setHours(0, 0, 0, 0);

        const addDays = (n) => { const d = new Date(TODAY); d.setDate(d.getDate() + n); return d; };
        const diffDays = (exp) => Math.round((exp - TODAY) / 86400000);
        const fmtDate = (d) => d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

        /* ── Mock product data / Local Storage sync ── */
        let PRODUCTS = [];
        const storedInv = localStorage.getItem('db_inventory');
        if (storedInv) {
            try {
                const inv = JSON.parse(storedInv);
                PRODUCTS = inv.map(item => {
                    let expDate = new Date();
                    if (item.expiry) {
                        expDate = new Date(item.expiry);
                        expDate.setHours(0, 0, 0, 0);
                    }
                    return {
                        id: item.id,
                        name: item.name,
                        category: item.label || 'Uncategorized',
                        expiry: expDate
                    };
                }).filter(item => item.expiry && !isNaN(item.expiry.getTime()));
            } catch (e) { console.error("Error parsing inventory:", e); }
        } else {
            // Fallback mock data if not run through the profile page yet
            PRODUCTS = [
                { id: 1, name: 'Full Cream Milk (1L)', category: 'Dairy', expiry: addDays(1) },
                { id: 2, name: 'Sliced White Bread', category: 'Bakery', expiry: addDays(2) },
                { id: 3, name: 'Paneer (200g)', category: 'Dairy', expiry: addDays(3) },
                { id: 4, name: 'Cream Cheese (200g)', category: 'Dairy', expiry: addDays(4) },
                { id: 5, name: 'Greek Yogurt (500g)', category: 'Dairy', expiry: addDays(5) },
                { id: 6, name: 'Fresh Orange Juice (1L)', category: 'Beverages', expiry: addDays(6) },
                { id: 7, name: 'Cooking Cream (200ml)', category: 'Dairy', expiry: addDays(7) },
                { id: 8, name: 'Eggs (12-pack)', category: 'Poultry', expiry: addDays(8) },
                { id: 9, name: 'Cheddar Cheese Block (250g)', category: 'Dairy', expiry: addDays(9) },
                { id: 10, name: 'Butter (250g)', category: 'Dairy', expiry: addDays(10) },
                { id: 11, name: 'Tomato Paste (400g)', category: 'Canned', expiry: addDays(12) },
                { id: 12, name: 'Mozzarella (125g)', category: 'Dairy', expiry: addDays(20) },
                { id: 13, name: 'Whole Wheat Pita', category: 'Bakery', expiry: addDays(30) },
            ];
        }

        /* ── Categorise ── */
        function getTier(days) {
            if (days >= 1 && days < 5) return 'urgent';
            if (days >= 5 && days <= 7) return 'warning';
            if (days >= 7 && days <= 10) return 'reminder';
            return null;
        }

        function getConfig(tier, days) {
            if (tier === 'urgent') return {
                cls: 'red', icon: '!',
                tag: days === 1 ? 'Expires tomorrow' : `${days} days left`,
                label: `URGENT — expires in ${days} day${days > 1 ? 's' : ''}`,
                pct: Math.max(5, (days / 5) * 40)
            };
            if (tier === 'warning') return {
                cls: 'yellow', icon: '~',
                tag: `${days} days left`,
                label: `WARNING — expires in ${days} days`,
                pct: 40 + ((days - 5) / 2) * 20
            };
            if (tier === 'reminder') return {
                cls: 'green', icon: 'i',
                tag: `${days} days left`,
                label: `REMINDER — expires in ${days} days`,
                pct: 60 + ((days - 7) / 3) * 40
            };
        }

        /* ── State ── */
        let activeFilter = 'all';

        function setFilter(f, btn) {
            activeFilter = f;
            document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        }

        /* ── Render cards ── */
        function renderList() {
            const enriched = PRODUCTS
                .map(p => ({ ...p, days: diffDays(p.expiry), tier: getTier(diffDays(p.expiry)) }))
                .filter(p => p.tier !== null)
                .sort((a, b) => a.days - b.days);

            const visible = activeFilter === 'all'
                ? enriched
                : enriched.filter(p => p.tier === activeFilter);

            const list = document.getElementById('notif-list');

            if (!visible.length) {
                list.innerHTML = `<div class="empty">
      <div class="empty-icon">&#10003;</div>
      No notifications match this filter.
    </div>`;
                return;
            }

            list.innerHTML = visible.map((p, i) => {
                const cfg = getConfig(p.tier, p.days);
                return `
    <div class="card ${cfg.cls}" style="animation-delay:${i * 0.06}s">
      <div class="card-inner">
        <div class="icon">${cfg.icon}</div>
        <div class="card-body">
          <div class="product-name">${p.name}</div>
          <div class="meta">
            ${p.category}&nbsp;&nbsp;·&nbsp;&nbsp;Expiry: ${fmtDate(p.expiry)}&nbsp;&nbsp;·&nbsp;&nbsp;${cfg.label}
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:0%" data-pct="${cfg.pct}"></div>
          </div>
        </div>
        <span class="tag">${cfg.tag}</span>
      </div>
    </div>`;
            }).join('');

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.querySelectorAll('.progress-bar').forEach(bar => {
                        bar.style.width = bar.dataset.pct + '%';
                    });
                });
            });
        }

        /* ── Render stats ── */
        function renderStats() {
            const enriched = PRODUCTS
                .map(p => ({ ...p, days: diffDays(p.expiry), tier: getTier(diffDays(p.expiry)) }))
                .filter(p => p.tier !== null);

            const cu = enriched.filter(p => p.tier === 'urgent').length;
            const cw = enriched.filter(p => p.tier === 'warning').length;
            const cr = enriched.filter(p => p.tier === 'reminder').length;

            animateCount('s-total', enriched.length);
            animateCount('s-urgent', cu);
            animateCount('s-warning', cw);
            animateCount('s-reminder', cr);

            document.getElementById('date-display').textContent = 'Today: ' + fmtDate(TODAY);
            const quiet = PRODUCTS.filter(p => getTier(diffDays(p.expiry)) === null).length;
            document.getElementById('footer').textContent =
                `Alerts fire for products expiring within 1–10 days (grouped by urgency). ` +
                `${quiet} product(s) in inventory have no active alert today.`;
        }

        function animateCount(id, target) {
            const el = document.getElementById(id);
            let current = 0;
            const step = () => {
                current++;
                el.textContent = current;
                if (current < target) requestAnimationFrame(step);
            };
            if (target > 0) requestAnimationFrame(step);
            else el.textContent = '0';
        }

        /* ── Init ── */
        renderStats();
        renderList();

        /* ── Cursor tooltip ── */
        const tip = document.getElementById('cursor-tip');
        const tipText = document.getElementById('tip-text');

        const TOOLTIP = {
            urgent: { cls: 'tip-red', msg: '🚨 URGENT — EXPIRES SOON' },
            warning: { cls: 'tip-yellow', msg: '⚠️ WARNING — ABOUT TO EXPIRE' },
            reminder: { cls: 'tip-green', msg: '✅ SAFE FOR EXPIRY' },
        };

        function showTip(e, tier) {
            const t = TOOLTIP[tier];
            tip.className = 'visible ' + t.cls;
            tipText.textContent = t.msg;
            moveTip(e);
        }
        function moveTip(e) {
            tip.style.left = e.clientX + 'px';
            tip.style.top = e.clientY + 'px';
        }
        function hideTip() { tip.className = ''; }

        document.getElementById('notif-list').addEventListener('mouseover', e => {
            const card = e.target.closest('.card');
            if (!card) { hideTip(); return; }
            const tier = card.classList.contains('red') ? 'urgent'
                : card.classList.contains('yellow') ? 'warning'
                    : card.classList.contains('green') ? 'reminder'
                        : null;
            if (tier) showTip(e, tier);
        });
        document.getElementById('notif-list').addEventListener('mousemove', e => {
            if (e.target.closest('.card')) moveTip(e);
        });
        document.getElementById('notif-list').addEventListener('mouseleave', hideTip);
        document.addEventListener('scroll', hideTip, { passive: true });
    </script>
</body>

</html>
